name: 🔄 Auto-Update Knowledge Base

on:
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'rag/**'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  trigger-webhook:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # 🔥 Общий таймаут джоба
    steps:
      - name: 📡 Send webhook to home PC
        run: |
          set -euo pipefail
          
          PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            '{ref: $ref, repository: {full_name: $repo}, head_commit: {id: $sha}}')
          
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -hex | awk '{print $2}')
          
          # 🔥 Увеличенные таймауты + обработка ошибок
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/response.json -X POST \
            "http://${{ secrets.VPS_HOST }}:${{ secrets.WEBHOOK_PORT }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "User-Agent: GitHub-Hookshot/${{ github.sha }}" \
            -d "$PAYLOAD" \
            --max-time 60 \          # 🔥 Максимум 60 сек на весь запрос
            --connect-timeout 10 \   # 🔥 10 сек на установление соединения
            --retry 2 \              # 🔥 2 повторные попытки
            --retry-delay 5 \
            --retry-connrefused || echo "000")
          
          if [[ "$HTTP_CODE" =~ ^(200|202)$ ]]; then
            echo "✅ Webhook доставлен (код $HTTP_CODE)"
            cat /tmp/response.json | jq