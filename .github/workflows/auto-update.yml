name: 🔄 Auto-Update Knowledge Base

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 🔥 Ручной запуск для тестов

jobs:
  trigger-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: 📡 Send webhook
        run: |
          echo "🚀 Формируем payload..."
          PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            '{ref: $ref, repository: {full_name: $repo}, head_commit: {id: $sha}}')
            
          echo "🔑 Генерируем подпись..."
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -hex | awk '{print $2}')
            
          echo "🌐 Отправляем запрос..."
          # 🔥 Всё в одной строке, чтобы bash не ломался
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/res.json -X POST \
            "http://${{ secrets.VPS_HOST }}:${{ secrets.WEBHOOK_PORT }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" --max-time 30 || echo "000")
            
          echo "📊 Ответ сервера: $HTTP_CODE"
          if [[ "$HTTP_CODE" =~ ^(200|202)$ ]]; then
            echo "✅ Webhook принят"
            cat /tmp/res.json | jq . 2>/dev/null || true
          else
            echo "⚠️ Ошибка или недоступность"
            cat /tmp/res.json 2>/dev/null || true
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          WEBHOOK_PORT: ${{ secrets.WEBHOOK_PORT }}
